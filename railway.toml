# HOFIZ BOT — Railway Bot Service konfiguratsiyasi

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.bot"

[deploy]
startCommand = "python -u -m src.bot.main 2>&1"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Bot polling rejimida ishlaydi — web server yo'q
# BOT_MODE=polling bo'lishi kerak (default)
