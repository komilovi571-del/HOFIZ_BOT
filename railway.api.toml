# HOFIZ BOT — Railway API Service konfiguratsiyasi
# Bu faylni API service uchun railway.toml sifatida ishlating:
#   cp railway.api.toml railway.toml
# (API servisini alohida Railway service sifatida deploy qilganda)

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.api"

[deploy]
startCommand = "uvicorn src.api.main:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
